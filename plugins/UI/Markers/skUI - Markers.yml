name: skUI - Markers
# requires: Shinobi-Api
# requires: skManager
description: Change the aspect of marker cards.
version: 2.0
ui:
  javascript:
    - skUI - Markers.js
  requires:
    - Shinobi-Api
    - skManager
settings:
    cardRemove:
      displayName: Card info remover
      description: Value - title, time, scene. Default - time, scene.
      type: STRING
    popoversRemove:
      displayName: Card popovers remover
      description: Value - performers, tags. Default - 
      type: STRING
    popoversCount:
      displayName: Card popovers count
      description: If off remove the popovers count. Default - on.
      type: BOOLEAN