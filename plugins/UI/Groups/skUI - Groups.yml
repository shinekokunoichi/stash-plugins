name: skUI - Groups
# requires: Shinobi-Api  
# requires: skManager
description: Change the aspect of group cards.
version: 2.0
ui:
  javascript:
    - skUI - Groups.js
  requires:
    - Shinobi-Api
    - skManager
settings:
    cardRemove:
      displayName: Card info remover
      description: Value - name, date, description. Default - date, description.
      type: STRING
    popoversRemove:
      displayName: Card popovers remover
      description: Value - scenes, tags, groups, o_counter. Default - 
      type: STRING
    popoversCount:
      displayName: Card popovers count
      description: If off remove the popovers count. Default - on.
      type: BOOLEAN