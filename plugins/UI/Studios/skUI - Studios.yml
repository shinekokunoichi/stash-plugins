name: skUI - Studios
# requires: Shinobi-Api
# requires: skManager
description: Change the aspect of studio cards.
version: 2.0
ui:
  javascript:
    - skUI - Studios.js
  requires:
    - Shinobi-Api
    - skManager
    - skUI - Theme
settings:
    cardRemove:
      displayName: Card info remover
      description: Value - name, child. Default - name.
      type: STRING
    cardOrganized:
      displayName: Card organized
      description: Apply a border to the card if the scene is organized. Default - on.
      type: BOOLEAN
    popoversRemove:
      displayName: Card popovers remover
      description: Value - scenes, galleries, images, performers, groups, o_counter. Default - o_counter
      type: STRING
    popoversCount:
      displayName: Card popovers count
      description: If off remove the popovers count. Default - on.
      type: BOOLEAN