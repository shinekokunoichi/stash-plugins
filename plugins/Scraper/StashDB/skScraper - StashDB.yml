name: skScraper - StashDB
# requires: Shinobi-Api
# requires: skManager
description: Auto metadata scraper from StashDB (based on title and name).
version: 2.1
ui:
  javascript:
    - skScraper - StashDB.js
  requires:
    - Shinobi-Api
    - skManager
    - skExtra - Keybinder
  csp:
    connect-src:
      - https://stashdb.org
settings:
    create:
      displayName: Create missing data
      description: If enabled will create any missing data. Default - off.
      type: BOOLEAN
    createFilter:
      displayName: Auto create filter
      description: Value - performers, studios, tags. Default - performers, studios, tags.
      type: STRING
    autoScrape:
      displayName: Auto scrape
      description: Enable auto scraping on update. Default - on.
      type: BOOLEAN
    autoScrapeFilter:
      displayName: Auto scrape filter
      description: Value - performers, studios and tags. Default - performers, studios, tags.
      type: STRING