name: skScraper - JAV
# requires: Shinobi-Api
# requires: skManager
description: Custom metadata scraper for JAV. Need CORS.
version: 2.1.2
ui:
  javascript:
    - skScraper - JAV.js
  requires:
    - Shinobi-Api
    - skManager
    - skExtra - Keybinder
  csp:
    connect-src:
      - https://www.javmost.ws
      - https://img3.javmost.ws
settings:
    create:
      displayName: Create missing data
      description: If enabled will create any missing data. Default - off.
      type: BOOLEAN
    createFilter:
      displayName: Auto create filter
      description: Value - performers, studios, groups, tags. Default - performers, studios, groups, tags.
      type: STRING
    autoScrape:
      displayName: Auto scrape
      description: Enable auto scraping on scene update. Default - on.
      type: BOOLEAN